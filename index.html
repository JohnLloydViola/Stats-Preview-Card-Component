<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/favicon-32x32.png">
</head>
<body>

  <main class="main-container">

    <div class="informations-container">

      <div class="info">
        <h1>Get <span class="accent">insights</span> that help your business grow.</h1>
        <p class="paragraph">Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>
      </div>

      <div class="statistics">
        <div class="companies">
          <h2>10k+</h2>
          <p class="paragraph">COMPANIES</p>
        </div>

        <div class="templates">
        <h2>314</h2>
        <p class="paragraph">TEMPLATES</p>
      </div>

      <div class="queries">
        <h2>12M+</h2>
        <p class="paragraph">QUERIES</p>
      </div>
      </div>

    </div>

    <div class="image-container">

      <img src="images/image-header-desktop.jpg" alt="main image">
      <div class="overlay">
      </div>

    </div>

  </main>
  
</body>
</html>
